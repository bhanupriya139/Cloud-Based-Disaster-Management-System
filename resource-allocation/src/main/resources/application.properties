# Application name
spring.application.name=resource-allocation

# PostgreSQL Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/disaster_db
spring.datasource.username=postgres
spring.datasource.password=admin123

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server port
server.port=8080
# Kafka topics for disaster events
kafka.topic.disaster-events=disaster-events
kafka.topic.disaster-alerts=disaster-alerts

# External API URLs (no API keys needed — all free!)
disaster.api.usgs.url=https://earthquake.usgs.gov/fdsnws/event/1/query
disaster.api.usgs.lookback-hours=24
disaster.api.usgs.min-magnitude=2.5

disaster.api.eonet.url=https://eonet.gsfc.nasa.gov/api/v3/events
disaster.api.eonet.lookback-days=7

disaster.api.gdacs.url=https://www.gdacs.org/xml/rss.xml

# Poll every 5 minutes
disaster.polling.cron=0 */5 * * * *